<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了｜プロボイスミュージックスクール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.wrap{max-width:680px;margin:0 auto;padding:48px 20px 80px;}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px 22px;box-shadow:0 10px 30px rgba(0,0,0,.05);}
.title{font-family:var(--g);font-size:1.4rem;font-weight:900;margin-bottom:10px;}
.desc{color:var(--text-sub);line-height:1.9;font-size:.92rem;}
.actions{margin-top:24px;display:flex;flex-wrap:wrap;gap:10px;}
.btn-link{display:inline-block;padding:12px 18px;border-radius:999px;font-family:var(--g);font-weight:700;font-size:.86rem;text-decoration:none;}
.btn-main{background:var(--green);color:#fff;}
.btn-sub{background:var(--bg-gray);color:var(--text-main);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 class="title">お問い合わせありがとうございます。</h1>
    <p class="desc">内容を確認のうえ、通常2営業日以内にご連絡いたします。<br>しばらく経っても返信が届かない場合は、<strong>info@xector1.com</strong> まで直接ご連絡ください。</p>
    <div class="actions">
      <a class="btn-link btn-main" href="index.html">トップページへ戻る</a>
      <a class="btn-link btn-sub" href="contact.html">お問い合わせフォームへ戻る</a>
    </div>
  </div>
</div>
</body>
</html>
