<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約ありがとうございます｜プロボイスミュージックスクール</title>
<meta name="description" content="無料体験レッスンへのご予約ありがとうございます。">
<link rel="canonical" href="https://www.provoicemusicschool.com/thanks">
<link rel="icon" href="img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body.thanks-page{padding-top:0;padding-bottom:0;background:var(--sky-mist);}
  .thanks-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
  .thanks-card{width:100%;max-width:720px;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:28px 20px;box-shadow:0 10px 30px rgba(0,0,0,.06);}
  .thanks-title{font-family:var(--g);font-size:clamp(1.5rem,5vw,2rem);font-weight:900;line-height:1.4;margin-bottom:20px;color:var(--text);}
  .thanks-text{white-space:pre-line;font-size:.98rem;line-height:2;color:var(--text-sub);margin-bottom:28px;}
  .thanks-btn{max-width:360px;}
  @media (min-width:768px){
    .thanks-card{padding:40px 36px;}
    .thanks-text{font-size:1rem;}
  }
</style>
</head>
<body class="thanks-page">
  <main class="thanks-wrap">
    <section class="thanks-card" aria-labelledby="thanks-title">
      <h1 class="thanks-title" id="thanks-title">ご予約ありがとうございます！</h1>
      <p class="thanks-text">{FNAME},さん
無料体験レッスンへのご予約ありがとうございます。

当日使用するレッスン入室用URLについて
記入したメールアドレス宛にリマインドメールにてご案内されますので、
お手元に届いているかご確認をお願いいたします。

※迷惑メールフォルダに入る可能性がありますので[すべてのメール]フォルダなどから確認してください。

何卒よろしくお願いいたします。


プロボイスミュージックスクール
運営事務局</p>
      <a class="btn thanks-btn" href="/">トップページに戻る</a>
    </section>
  </main>
</body>
</html>
