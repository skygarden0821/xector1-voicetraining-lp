<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜プロボイスミュージックスクール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.page-hd{background:#fff;border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:50;}
.page-hd a{font-family:var(--g);font-size:.8rem;color:var(--sky);font-weight:700;}
.doc-wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px;}
.doc-title{font-family:var(--g);font-size:1.5rem;font-weight:900;margin-bottom:8px;}
.contact-note{background:var(--sky-pale);border:1px solid rgba(74,173,232,.2);border-radius:10px;padding:14px 18px;font-size:.82rem;color:var(--text-sub);line-height:1.9;margin-bottom:32px;}
.contact-note a{color:var(--sky);font-weight:700;}
.form-group{margin-bottom:22px;}
.form-label{font-family:var(--g);font-size:.85rem;font-weight:700;display:block;margin-bottom:8px;}
.form-label .req{font-size:.65rem;font-weight:900;background:var(--accent);color:#fff;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.form-label .opt{font-size:.65rem;font-weight:700;background:var(--bg-gray);color:var(--text-light);padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.form-row{display:flex;gap:10px;}
.form-row .form-input{flex:1;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--r);font-size:.95rem;background:#fff;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.form-input:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(74,173,232,.12);}
textarea.form-input{resize:vertical;min-height:140px;line-height:1.8;}
.form-hint{font-size:.72rem;color:var(--text-light);margin-top:5px;line-height:1.6;}
.form-submit{display:block;width:100%;padding:18px;background:var(--green);color:#fff;font-family:var(--g);font-size:1.05rem;font-weight:900;border:none;border-radius:60px;cursor:pointer;box-shadow:0 4px 20px rgba(6,199,85,.3);letter-spacing:.04em;margin-top:8px;transition:background .2s;}
.form-submit:hover{background:var(--green-dark);}
.form-confirm{background:var(--bg-gray);border-radius:14px;padding:20px;margin-top:24px;font-size:.82rem;color:var(--text-sub);line-height:2;text-align:center;}
</style>
</head>
<body style="padding-top:0;padding-bottom:40px;">
<div class="page-hd"><a href="index.html">← プロボイスミュージックスクール TOP</a></div>
<div class="doc-wrap">
  <h1 class="doc-title">お問い合わせ</h1>
  <div class="contact-note">
    メールの受信制限をされている方は <strong>info@xector1.com</strong> からのメールを受信できるように設定してください。<br>
    ※体験レッスンのご予約は<a href="index.html#contact">こちら</a>からお願いいたします。
  </div>

  <form id="contactForm" name="contact" method="POST" action="https://formsubmit.co/info@xector1.com" onsubmit="return validateForm()">
    <input type="hidden" name="_next" id="nextUrl" value="">
    <input type="hidden" name="_subject" value="【お問い合わせ】プロボイスミュージックスクール">
    <input type="hidden" name="_captcha" value="false">
    <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

    <div class="form-group">
      <label class="form-label">氏名<span class="req">必須</span></label>
      <div class="form-row">
        <input class="form-input" type="text" name="last_name" placeholder="姓（例：山田）" required>
        <input class="form-input" type="text" name="first_name" placeholder="名（例：花子）" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">フリガナ<span class="req">必須</span></label>
      <div class="form-row">
        <input class="form-input" type="text" name="last_kana" placeholder="セイ（例：ヤマダ）" required>
        <input class="form-input" type="text" name="first_kana" placeholder="メイ（例：ハナコ）" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">電話番号<span class="req">必須</span></label>
      <input class="form-input" type="tel" name="phone" placeholder="090-0000-0000" required>
      <div class="form-hint">携帯電話など連絡が取りやすい番号をご記入ください。</div>
    </div>

    <div class="form-group">
      <label class="form-label">メールアドレス<span class="req">必須</span></label>
      <input class="form-input" type="email" name="email" id="email" placeholder="example@email.com" required>
      <div class="form-hint">連絡が取りやすいアドレスをご記入ください。</div>
    </div>

    <div class="form-group">
      <label class="form-label">メールアドレス（確認用）<span class="req">必須</span></label>
      <input class="form-input" type="email" name="email_confirm" id="email_confirm" placeholder="example@email.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">お問い合わせ内容<span class="req">必須</span></label>
      <textarea class="form-input" name="message" placeholder="ご質問・ご相談内容をご記入ください。" required></textarea>
    </div>

    <button type="submit" class="form-submit">送信する</button>
    <div class="form-confirm">送信後、確認メールが自動で届きます。<br>返信は通常2営業日以内を目安にご連絡いたします。</div>
  </form>
</div>
<script>
function validateForm(){
  var e=document.getElementById('email').value;
  var ec=document.getElementById('email_confirm').value;
  if(e!==ec){alert('メールアドレスが一致しません。');return false;}
  return true;
}

document.getElementById('nextUrl').value=window.location.origin+'/thanks.html';
</script>
</body>
</html>
